<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Juego móvil en primera persona para pilotar un avión sobre un mapa satélite con terreno 3D y controles táctiles."
    />
    <meta name="theme-color" content="#07111f" />

    <title>Plane 2 - Vuelo satélite 3D</title>

    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
  </head>

  <body class="min-h-screen overflow-hidden bg-slate-950 text-white antialiased">
    <div id="app" class="relative min-h-screen overflow-hidden">
      <main class="relative min-h-screen" aria-label="Juego de vuelo en primera persona">
        <section class="relative h-dvh min-h-screen overflow-hidden bg-slate-950">
          <div id="flight-map" class="absolute inset-0" aria-hidden="true"></div>

          <div
            class="pointer-events-none absolute inset-x-0 top-0 z-10 bg-gradient-to-b from-black/80 via-black/30 to-transparent px-4 pb-12 pt-[calc(0.9rem+env(safe-area-inset-top,0px))]"
          >
            <header class="mx-auto flex max-w-5xl items-start justify-between gap-3">
              <div>
                <p class="text-[0.68rem] font-bold uppercase tracking-[0.28em] text-sky-200/90">
                  Plane 2
                </p>
                <h1 class="text-xl font-black leading-none tracking-tight sm:text-3xl">
                  Vuelo satélite 3D
                </h1>
              </div>
              <div class="grid min-w-28 gap-1 rounded-2xl border border-white/15 bg-slate-950/50 px-3 py-2 text-right text-xs shadow-2xl backdrop-blur-md">
                <span>Distancia <strong id="score" class="text-white">0</strong> m</span>
                <span>Mejor <strong id="best-score" class="text-white">0</strong> m</span>
              </div>
            </header>
          </div>

          <div class="pointer-events-none absolute inset-0 z-20" aria-hidden="true">
            <div class="absolute left-1/2 top-[18%] h-12 w-px -translate-x-1/2 bg-sky-100/50"></div>
            <div class="absolute left-1/2 top-[18%] h-px w-24 -translate-x-1/2 bg-sky-100/50"></div>
            <div class="absolute left-1/2 top-[18%] h-3 w-3 -translate-x-1/2 -translate-y-1/2 rounded-full border border-sky-100/70"></div>
            <div class="absolute inset-x-0 bottom-0 h-1/2 bg-gradient-to-t from-slate-950/85 via-slate-950/20 to-transparent"></div>
          </div>

          <div
            class="absolute inset-x-0 bottom-0 z-30 px-4 pb-[calc(1rem+env(safe-area-inset-bottom,0px))]"
          >
            <div class="mx-auto grid max-w-5xl grid-cols-[1fr_auto_1fr] items-end gap-3">
              <div class="flex justify-start">
                <div class="mobile-control" aria-label="Volante de dirección">
                  <span class="control-label">Volante</span>
                  <div id="steering-control" class="steering-wheel" role="slider" aria-label="Giro del avión" aria-valuemin="-100" aria-valuemax="100" aria-valuenow="0" tabindex="0">
                    <div class="steering-spoke steering-spoke-a"></div>
                    <div class="steering-spoke steering-spoke-b"></div>
                    <div class="steering-spoke steering-spoke-c"></div>
                    <div class="steering-hub"></div>
                  </div>
                </div>
              </div>

              <div class="rounded-full border border-white/15 bg-black/35 px-4 py-2 text-center text-xs font-bold uppercase tracking-[0.22em] text-sky-100/90 shadow-2xl backdrop-blur-md">
                <span id="speed-readout">0 km/h</span>
              </div>

              <div class="flex justify-end">
                <div class="mobile-control items-end" aria-label="Palanca de aceleración">
                  <span class="control-label">Potencia</span>
                  <div id="throttle-control" class="throttle-track" role="slider" aria-label="Aceleración" aria-valuemin="0" aria-valuemax="100" aria-valuenow="40" tabindex="0">
                    <div class="throttle-fill"></div>
                    <div class="throttle-handle"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div
            id="overlay"
            class="absolute inset-0 z-40 flex items-center justify-center bg-slate-950/72 p-6 backdrop-blur-sm"
          >
            <div class="max-w-sm rounded-[2rem] border border-white/15 bg-white/10 p-6 text-center shadow-2xl backdrop-blur-xl">
              <p class="text-xs font-bold uppercase tracking-[0.28em] text-sky-200">Primera persona</p>
              <h2 id="overlay-title" class="mt-3 text-3xl font-black">Pilota sobre terreno 3D</h2>
              <p id="overlay-message" class="mt-3 text-sm leading-relaxed text-slate-200">
                Usa el volante para girar y la palanca para acelerar. El mapa usa vista satélite con relieve real y cámara baja para sensación de cabina.
              </p>
              <button
                id="play-button"
                class="mt-6 rounded-full bg-sky-200 px-6 py-3 font-black text-slate-950 transition hover:scale-105 focus:outline-none focus:ring-4 focus:ring-sky-200/40"
                type="button"
              >
                Despegar
              </button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./src/js/app.js"></script>
  </body>
</html>
